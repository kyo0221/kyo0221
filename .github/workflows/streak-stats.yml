name: GitHub Streak Stats
on:
  # 毎日0時（UTC）に自動実行
  schedule:
    - cron: "0 0 * * *"
  # 手動実行も可能にする
  workflow_dispatch:
  # mainブランチへのpushでも実行
  push:
    branches:
      - main
jobs:
  streak-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=kyo0221&hide_border=true&background=FFF9FB&ring=F7A8C4&fire=FFB6C1&currStreakLabel=8A7CA8&sideLabels=594F6D&currStreakNum=594F6D&sideNums=594F6D&dates=B8A9C9&disable_animations=true
          path: output/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update streak stats"
          file_pattern: output/streak.svg
